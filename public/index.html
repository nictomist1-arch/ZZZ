<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8-BIT Notes | Книга заметок</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        body {
            font-family: 'Press Start 2P', 'Courier New', monospace;
            background: #8B8B8B;
            min-height: 100vh;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
            image-rendering: pixelated;
        }

        /* Текстурный фон как у земли */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(45deg, 
                    rgba(100, 100, 100, 0.3) 0px, 
                    rgba(100, 100, 100, 0.3) 2px,
                    transparent 2px,
                    transparent 8px),
                repeating-linear-gradient(135deg, 
                    rgba(80, 80, 80, 0.3) 0px, 
                    rgba(80, 80, 80, 0.3) 2px,
                    transparent 2px,
                    transparent 8px);
            pointer-events: none;
            z-index: 0;
        }

        /* Контейнер */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Minecraft стиль карточки */
        .app-card {
            background: #C6C6C6;
            border: 4px solid #373737;
            box-shadow: 
                inset 0 0 0 2px #FFFFFF,
                inset 0 0 0 4px #8B8B8B,
                0 8px 16px rgba(0, 0, 0, 0.3);
            image-rendering: pixelated;
            overflow: hidden;
        }

        /* Хедер в стиле Minecraft */
        .header {
            background: #8B8B8B;
            padding: 30px;
            text-align: center;
            border-bottom: 4px solid #373737;
            position: relative;
            background-image: repeating-linear-gradient(
                90deg,
                rgba(0, 0, 0, 0.1) 0px,
                rgba(0, 0, 0, 0.1) 2px,
                transparent 2px,
                transparent 8px
            );
        }

        .header h1 {
            font-size: 2rem;
            font-weight: normal;
            color: #3A2A1F;
            text-shadow: 3px 3px 0 #D4B48C;
            margin-bottom: 15px;
            letter-spacing: 2px;
            font-family: 'Press Start 2P', monospace;
        }

        .header p {
            color: #2A2A2A;
            font-size: 0.7rem;
            margin-bottom: 15px;
            font-family: 'Press Start 2P', monospace;
        }

        .stats {
            display: inline-block;
            background: #373737;
            color: #D4B48C;
            padding: 8px 16px;
            font-size: 0.6rem;
            font-family: 'Press Start 2P', monospace;
            border: 2px solid #1F1F1F;
            box-shadow: inset 0 0 0 2px #5F5F5F;
            image-rendering: pixelated;
        }

        /* Панель кнопок */
        .buttons {
            padding: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
            background: #9B9B9B;
            border-bottom: 4px solid #373737;
            flex-wrap: wrap;
        }

        button {
            background: #5F5F5F;
            color: #FFFFFF;
            border: none;
            padding: 12px 24px;
            cursor: pointer;
            font-size: 0.65rem;
            font-weight: normal;
            font-family: 'Press Start 2P', monospace;
            transition: all 0.05s linear;
            position: relative;
            box-shadow: 
                inset -2px -2px 0 0 #1F1F1F,
                inset 2px 2px 0 0 #9F9F9F,
                0 4px 8px rgba(0, 0, 0, 0.3);
            image-rendering: pixelated;
            text-transform: uppercase;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 
                inset 2px 2px 0 0 #1F1F1F,
                inset -2px -2px 0 0 #9F9F9F,
                0 2px 4px rgba(0, 0, 0, 0.3);
        }

        button:hover {
            background: #7F7F7F;
            transform: translateY(-1px);
        }

        /* Контейнер заметок */
        .notes-container {
            padding: 20px;
            max-height: 600px;
            overflow-y: auto;
            background: #C6C6C6;
            background-image: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.05) 0px,
                rgba(0, 0, 0, 0.05) 2px,
                transparent 2px,
                transparent 4px
            );
        }

        /* Стилизация скроллбара в стиле Minecraft */
        .notes-container::-webkit-scrollbar {
            width: 12px;
        }

        .notes-container::-webkit-scrollbar-track {
            background: #5F5F5F;
            border: 2px solid #373737;
        }

        .notes-container::-webkit-scrollbar-thumb {
            background: #8B8B8B;
            border: 2px solid #373737;
        }

        .notes-container::-webkit-scrollbar-thumb:hover {
            background: #9B9B9B;
        }

        /* Карточка заметки в стиле Minecraft */
        .note-card {
            background: #F5F5F5;
            border: 3px solid #373737;
            margin-bottom: 20px;
            padding: 20px;
            position: relative;
            box-shadow: 
                inset 0 0 0 1px #FFFFFF,
                0 4px 8px rgba(0, 0, 0, 0.2);
            transition: all 0.1s ease;
            image-rendering: pixelated;
        }

        .note-card:hover {
            transform: translateY(-2px);
            box-shadow: 
                inset 0 0 0 1px #FFFFFF,
                0 6px 12px rgba(0, 0, 0, 0.3);
        }

        /* Заголовок карточки */
        .note-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #8B8B8B;
        }

        .note-id {
            background: #373737;
            color: #D4B48C;
            padding: 4px 12px;
            font-size: 0.55rem;
            font-family: 'Press Start 2P', monospace;
            border: 2px solid #1F1F1F;
            box-shadow: inset 0 0 0 1px #5F5F5F;
        }

        .note-date {
            color: #5F5F5F;
            font-size: 0.5rem;
            font-family: 'Press Start 2P', monospace;
            background: #E5E5E5;
            padding: 4px 8px;
            border: 1px solid #8B8B8B;
        }

        /* Название заметки */
        .note-title {
            font-size: 1rem;
            font-weight: normal;
            color: #3A2A1F;
            margin-bottom: 12px;
            line-height: 1.4;
            font-family: 'Press Start 2P', monospace;
            text-shadow: 1px 1px 0 #D4B48C;
            word-break: break-word;
        }

        /* Содержание заметки */
        .note-content {
            color: #2A2A2A;
            line-height: 1.6;
            font-size: 0.7rem;
            margin-bottom: 15px;
            font-family: 'Courier New', monospace;
            word-break: break-word;
        }

        /* Кнопки действий в карточке */
        .note-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #8B8B8B;
        }

        .note-actions button {
            padding: 6px 16px;
            font-size: 0.5rem;
            background: #6F6F6F;
        }

        /* Пустое состояние */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: #D4D4D4;
            border: 3px solid #373737;
            box-shadow: inset 0 0 0 2px #FFFFFF;
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 20px;
            filter: drop-shadow(2px 2px 0 #373737);
        }

        .empty-state p {
            font-size: 0.7rem;
            color: #3A2A1F;
            margin-bottom: 10px;
            font-family: 'Press Start 2P', monospace;
        }

        .empty-state small {
            font-size: 0.5rem;
            color: #5F5F5F;
            font-family: 'Press Start 2P', monospace;
        }

        /* Лоадер в стиле Minecraft */
        .loading {
            text-align: center;
            padding: 60px;
        }

        .loader {
            width: 48px;
            height: 48px;
            margin: 0 auto 20px;
            background: #5F5F5F;
            border: 4px solid #373737;
            box-shadow: inset 0 0 0 2px #9F9F9F;
            animation: spin 0.8s steps(4) infinite;
            image-rendering: pixelated;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .loading p {
            color: #3A2A1F;
            font-size: 0.6rem;
            font-family: 'Press Start 2P', monospace;
        }

        /* Уведомления в стиле Minecraft */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #373737;
            color: #D4B48C;
            padding: 12px 20px;
            font-size: 0.6rem;
            font-family: 'Press Start 2P', monospace;
            border: 3px solid #1F1F1F;
            box-shadow: 
                inset 0 0 0 2px #5F5F5F,
                0 4px 12px rgba(0, 0, 0, 0.3);
            transform: translateX(400px);
            transition: transform 0.2s ease;
            z-index: 1000;
            cursor: pointer;
            image-rendering: pixelated;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.error {
            background: #8B3A3A;
            color: #FFB4B4;
        }

        .toast.success {
            background: #3A8B3A;
            color: #B4FFB4;
        }

        /* Анимации */
        @keyframes pixelFade {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .note-card {
            animation: pixelFade 0.2s steps(8);
        }

        /* Текстурные элементы */
        .grass-block {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40px;
            background: #5F5F5F;
            border-top: 4px solid #3A7F3A;
            box-shadow: inset 0 2px 0 0 #7FBF7F;
            pointer-events: none;
            z-index: 0;
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            body {
                padding: 20px 15px;
            }

            .header h1 {
                font-size: 1.2rem;
            }

            .buttons {
                padding: 15px;
                gap: 10px;
            }

            button {
                padding: 8px 16px;
                font-size: 0.5rem;
            }

            .notes-container {
                padding: 15px;
            }

            .note-card {
                padding: 15px;
            }

            .note-title {
                font-size: 0.8rem;
            }

            .note-content {
                font-size: 0.6rem;
            }

            .toast {
                bottom: 20px;
                right: 20px;
                left: 20px;
                text-align: center;
                font-size: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="grass-block"></div>
    
    <div class="container">
        <div class="app-card">
            <div class="header">
                <h1>8-BIT NOTES</h1>
                <p>✦ КНИГА ЗАМЕТОК ✦</p>
                <div class="stats" id="stat">ЗАМЕТОК: 0</div>
            </div>
            
            <div class="buttons">
                <button onclick="addNote()">
                    СОЗДАТЬ
                </button>
                <button onclick="editNote()">
                    ПРАВИТЬ
                </button>
                <button onclick="deleteNote()">
                    УДАЛИТЬ
                </button>
            </div>
            
            <div class="notes-container" id="content">
                <div class="empty-state">
                    <div class="icon"></div>
                    <p>КНИГА ПУСТА</p>
                    <small>НАЖМИ "СОЗДАТЬ" ЧТОБЫ НАЧАТЬ</small>
                </div>
            </div>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>
    
    <script src="/api/app.js"></script>
    
    <script>
        // Звук клика (имитация)
        function playClickSound() {
            const audio = new Audio('data:audio/wav;base64,U3RlYWx0aCBzb3VuZA==');
            audio.volume = 0.1;
            audio.play().catch(() => {});
        }
        
        // Эффект частиц при клике
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', (e) => {
                // Создаем пиксельные частицы
                for(let i = 0; i < 8; i++) {
                    const particle = document.createElement('div');
                    particle.style.position = 'fixed';
                    particle.style.width = '4px';
                    particle.style.height = '4px';
                    particle.style.backgroundColor = '#D4B48C';
                    particle.style.border = '1px solid #8B8B8B';
                    particle.style.left = e.clientX + 'px';
                    particle.style.top = e.clientY + 'px';
                    particle.style.pointerEvents = 'none';
                    particle.style.zIndex = '9999';
                    particle.style.animation = `particleFly ${0.3 + Math.random() * 0.3}s ease-out forwards`;
                    
                    const angle = Math.random() * Math.PI * 2;
                    const velocity = 50 + Math.random() * 50;
                    const vx = Math.cos(angle) * velocity;
                    const vy = Math.sin(angle) * velocity;
                    
                    particle.style.setProperty('--vx', vx + 'px');
                    particle.style.setProperty('--vy', vy + 'px');
                    
                    document.body.appendChild(particle);
                    setTimeout(() => particle.remove(), 500);
                }
            });
        });
        
        const style = document.createElement('style');
        style.textContent = `
            @keyframes particleFly {
                0% {
                    transform: translate(0, 0);
                    opacity: 1;
                }
                100% {
                    transform: translate(var(--vx), var(--vy));
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
